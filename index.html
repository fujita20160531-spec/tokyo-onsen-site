<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>東京おすすめ温泉</title>

  <style>
body {
  font-family: 'Helvetica Neue', sans-serif;
  margin: 0;
  color: #e2e8f0;

  background: 
    linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)),
    url("https://images.unsplash.com/photo-1545569341-9eb8b30979d9");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

header {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  text-align: center;
  padding: 40px 20px;
}

h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: 2px;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #1e293b;
  margin: 20px 0;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-5px);
}

img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h2 {
  padding: 15px;
  margin: 0;
}

.card p {
  padding: 0 15px 15px;
}

button {
  margin: 0 15px 15px;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  border: none;
  padding: 10px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  width: calc(100% - 30px);
}

button:hover {
  opacity: 0.8;
}
  </style>
</head>

<body>

<header>
  <h1>♨️ 東京おすすめ温泉</h1>
</header>

<div class="container">

  <div class="card">
    <h2>改良湯</h2>
    <img src="spa1.jpg" />
    <p>渋谷にあるおしゃれ銭湯。デザイン性が高く若者に人気。</p>
    <button onclick="showAlert()">詳細を見る</button>
  </div>

  <div class="card">
    <h2>萩の湯</h2>
    <img src="https://images.unsplash.com/photo-1559628233-100c798642d4" />
    <p>上野近くの大型銭湯。コスパ最強で地元民にも愛されている。</p>
    <button onclick="showAlert()">詳細を見る</button>
  </div>

  <div class="card">
    <h2>スパ ラクーア</h2>
    <img src="https://source.unsplash.com/600x400/?onsen" />
    <p>都心で楽しめる高級温泉。サウナも充実。</p>
    <button onclick="showAlert()">詳細を見る</button>
  </div>

  <div class="card">
    <h2>豊島園 庭の湯</h2>
    <img src="https://source.unsplash.com/600x400/?hot-spring" />
    <p>自然に囲まれた癒し空間。</p>
    <button onclick="showAlert()">詳細を見る</button>
  </div>

</div>

<script>
function showAlert() {
  alert("詳細ページはこれから作る予定です！");
}
</script>

</body>
</html>
