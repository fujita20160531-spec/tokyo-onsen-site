<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>東京おすすめ温泉</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>♨️ 東京おすすめ温泉</h1>
</header>
  
<div class="card">
  <h2>改良湯</h2>
  <img src="https://source.unsplash.com/600x400/?spa" />
  <p>渋谷にあるおしゃれ銭湯。デザイン性が高く若者に人気。</p>
  <button onclick="showAlert()">詳細を見る</button>
</div>

<div class="card">
  <h2>萩の湯</h2>
  <img src="https://source.unsplash.com/600x400/?onsen-bath" />
  <p>上野近くの大型銭湯。コスパ最強で地元民にも愛されている。</p>
  <button onclick="showAlert()">詳細を見る</button>
</div>
  
<div class="container">

  <div class="card">
    <h2>スパ ラクーア</h2>
    <img src="https://source.unsplash.com/600x400/?onsen" />
    <p>都心で楽しめる高級温泉。サウナも充実。</p>
    <button onclick="showAlert()">詳細を見る</button>
  </div>

  <div class="card">
    <h2>豊島園 庭の湯</h2>
    <img src="https://source.unsplash.com/600x400/?hot-spring" />
    <p>自然に囲まれた癒し空間。</p>
    <button onclick="showAlert()">詳細を見る</button>
  </div>

</div>

<script>
function showAlert() {
  alert("詳細ページはこれから作る予定です！");
}
</script>

</body>
</html>
